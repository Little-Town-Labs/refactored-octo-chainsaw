name: product-gate

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Optional preview URL for browser-backed gate metadata
        required: false
        type: string
  pull_request:
    types: [labeled, synchronize, reopened, opened]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: product-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  product-gate:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'product-gate')
    name: product gate report
    runs-on: [self-hosted, linux, x64, spyglass-ci]
    environment: ci
    timeout-minutes: 20
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      NEON_PARENT_BRANCH_ID: ${{ secrets.NEON_PARENT_BRANCH_ID }}
      PRODUCT_CANARY_URL: ${{ github.event.inputs.target_url }}
      PRODUCT_HARNESS_COMMAND: product:gate
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: build workspace
        run: pnpm -r run build

      - name: generate product gate reports
        run: |
          pnpm --silent product:gate > product-harness-sample.json
          node -e "import('node:fs/promises').then(async fs => { const sample = JSON.parse(await fs.readFile('product-harness-sample.json', 'utf8')); await fs.writeFile('product-harness-report.json', JSON.stringify(sample.report_json, null, 2) + '\n'); await fs.writeFile('product-harness-report.md', sample.report_markdown); })"

      - name: upload product gate report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: product-harness-report-${{ github.sha }}
          path: |
            product-harness-report.json
            product-harness-report.md
            product-harness-sample.json
          retention-days: 90
