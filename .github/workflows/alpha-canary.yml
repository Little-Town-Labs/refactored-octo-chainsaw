name: alpha-canary

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Preview or production Alpha URL to canary
        required: false
        type: string
      dry_run:
        description: Run deterministic non-deployed canary sample without preview/prod secrets
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "43 * * * *"
  deployment_status:

permissions:
  contents: read

concurrency:
  group: alpha-canary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  alpha-canary:
    if: >-
      github.event_name != 'deployment_status' ||
      github.event.deployment_status.state == 'success'
    name: alpha canary report
    runs-on: [self-hosted, linux, x64, spyglass-ci]
    environment: production
    timeout-minutes: 20
    env:
      PRODUCT_CANARY_URL: ${{ github.event.inputs.target_url || github.event.deployment_status.target_url || vars.PRODUCT_CANARY_URL }}
      PRODUCT_CANARY_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && 'true' || 'false' }}
      PRODUCT_CANARY_VALIDATE_ENV: "true"
      BROWSERBASE_PROJECT_ID: ${{ vars.BROWSERBASE_PROJECT_ID || secrets.BROWSERBASE_PROJECT_ID }}
      BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
      PRODUCT_HARNESS_DATABASE_URL: ${{ secrets.PRODUCT_HARNESS_DATABASE_URL }}
      PRODUCT_ARTIFACT_STORE_PROVIDER: ${{ vars.PRODUCT_ARTIFACT_STORE_PROVIDER }}
      PRODUCT_ARTIFACT_STORE_BUCKET: ${{ vars.PRODUCT_ARTIFACT_STORE_BUCKET }}
      PRODUCT_ARTIFACT_STORE_PREFIX: ${{ vars.PRODUCT_ARTIFACT_STORE_PREFIX || 'alpha-canary' }}
      PRODUCT_ARTIFACT_STORE_CREDENTIAL_REF: ${{ vars.PRODUCT_ARTIFACT_STORE_CREDENTIAL_REF || 'env:BLOB_READ_WRITE_TOKEN' }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      PRODUCT_HARNESS_COMMAND: product:canary
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: validate canary configuration
        run: |
          pnpm exec tsx -e "import { assertValidProductCanaryEnvironment } from './packages/product-test-harness/src/reporting/canary-env.ts'; const validation = assertValidProductCanaryEnvironment(process.env); console.log(JSON.stringify({ mode: validation.mode, target_url_label: validation.target_url_label, required_env: validation.required_env }, null, 2));"

      - name: build workspace
        run: pnpm -r run build

      - name: generate alpha canary reports
        run: |
          pnpm --silent product:canary > product-harness-sample.json
          node -e "import('node:fs/promises').then(async fs => { const sample = JSON.parse(await fs.readFile('product-harness-sample.json', 'utf8')); await fs.writeFile('product-harness-report.json', JSON.stringify(sample.report_json, null, 2) + '\n'); await fs.writeFile('product-harness-report.md', sample.report_markdown); })"

      - name: upload alpha canary report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: product-harness-canary-report-${{ github.sha }}
          path: |
            product-harness-report.json
            product-harness-report.md
            product-harness-sample.json
          retention-days: 90
