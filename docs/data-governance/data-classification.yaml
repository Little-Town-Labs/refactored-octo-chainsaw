# Spyglass data-classification register
#
# Authoritative classification of every column in the Spyglass relational
# schema. The schema-lint script (scripts/check-schema-conventions.sh)
# verifies coverage between this file and the Drizzle schema modules
# under packages/db/src/schema/.
#
# Governance origin: F03 (.specify/specs/03-db-schema-migrations/).
# Contract: .specify/specs/03-db-schema-migrations/contracts/data-classification.schema.yaml
# Retention horizons: docs/data-governance/retention-policy.md
# Migration & evolution conventions: docs/data-governance/schema-conventions.md
# Integrity invariants: docs/data-governance/integrity-invariants.md
#
# Material changes to this file SHALL ship as standalone PRs (NFR-5),
# not bundled with unrelated schema work, so reviewer attention is
# focused on classification deltas.

$schema_version: "1.0"
$generated: false
$last_reviewed: "2026-05-12"
$owner: "Gary"

# Data classes — see retention-policy.md for the horizon and lawful
# basis attached to each id.
data_classes:
  - id: identity_humanref
    description: >-
      External IdP identifiers and human-display attributes tying a
      principal row to a real natural person (Clerk user_id, email-as-id,
      display_name). Personal data under GDPR Art. 4(1).
    sensitivity: high
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(b) — performance of a contract with the data subject
      (Spyglass terms of service for seekers / employer-admins).

  - id: identity_principal
    description: >-
      Internal principal identifiers and structural attributes
      (principal_id, kind, tier, org membership) that exist solely to
      let Spyglass route authorization and audit decisions. Tied to a
      human via identity_humanref but not personal data on its own
      once the linkage is tombstoned.
    sensitivity: medium
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(b) — contract (cascades from identity_humanref).

  - id: operational_credential
    description: >-
      Metadata about issued JWTs (kid, scope_set, run/contract bindings,
      issued_at, expires_at, revoked_at). No PII; required for
      revocation, rate-limiting, and forensic attribution.
    sensitivity: low
    erasure_mode: hard_delete
    default_lawful_basis: >-
      GDPR Art. 6(1)(f) — legitimate interest (platform security and
      auditability); SOC 2 CC7 monitoring.

  - id: operational_signing_key
    description: >-
      EdDSA keypair metadata and the public key (JWK). The public key
      is published at /.well-known/jwks.json and is not confidential;
      lifecycle timestamps are retained as long as any credential
      signed by the key remains verifiable.
    sensitivity: low
    erasure_mode: hard_delete
    default_lawful_basis: >-
      Operational requirement — without these rows the platform cannot
      verify previously-issued credentials. GDPR Art. 6(1)(f)
      legitimate interest applies if any tie-back to a person exists.

  - id: audit_record
    description: >-
      Structured audit-event rows (principal_id, event_name,
      correlation_id, payload). The payload jsonb may contain
      personal data depending on the event; the strictest applicable
      class therefore applies (EC-1).
    sensitivity: high
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — legal obligation (audit retention under
      SOC 2 CC7 and AEDT regulations including NYC LL 144 §5-301).

  - id: approval_workflow
    description: >-
      Two-operator gate approval rows: who initiated, who approved,
      reason_code, free-text notes, decision timestamps. The notes
      column may contain personal data references; row metadata
      (initiator/approver/target principal IDs) is operational and
      retained for accountability.
    sensitivity: medium
    erasure_mode: redact_in_place
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — accountability obligation (Constitution
      §I.5.3); notes redacted on subject erasure, row retained.

  # ------------------------------------------------------------------
  # F04 data classes (Ticket store + state machines)
  # ------------------------------------------------------------------
  - id: ticket_intent
    description: >-
      Seeker-side and employer-side ticket rows capturing an intent
      to be matched: role spec, comp band, jurisdictions, work mode,
      headcount. Joins to a principal (and on the employer side, an
      organization). Personal data via the principal linkage even
      when individual columns are operational.
    sensitivity: high
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(b) — performance of contract (Spyglass matching
      service); audit-retention obligation under §I.5.3 keeps row
      metadata after tombstone.

  - id: ticket_match
    description: >-
      Match-ticket rows pairing a seeker_ticket with an
      employer_req_ticket and producing the run_id F02's
      agent_credentials reference. Carries frozen contract /
      privacy-ruleset refs (Parley SPEC §4.1.1), round counter,
      decision-locus jurisdiction, and (post-F10) the dossier FK.
    sensitivity: high
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(b) — performance of contract; row metadata
      retained for audit (§I.5.3) and bias-audit-readiness (§I.2 +
      NIST AI RMF Measure 2.11).

  # ------------------------------------------------------------------
  # F05 data classes (Audit log + transcript store + tombstone)
  # ------------------------------------------------------------------
  - id: transcript_record
    description: >-
      Canonical Parley negotiation turns and associated run metadata.
      Raw turn content may contain seeker PII, employer-confidential
      context, tool-returned text, or model outputs. Stored separately
      from dossiers with stricter access controls.
    sensitivity: high
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(b) — performance of contract for negotiation
      execution; GDPR Art. 6(1)(c) / Art. 6(1)(f) for auditability,
      dispute handling, and AEDT compliance evidence.

  - id: tombstone_evidence
    description: >-
      Versioned redaction metadata that proves personal data was
      removed without breaking the audit chain: target reference,
      lawful basis, operator principal, original/replacement hashes,
      procedure version, and timestamp. MUST NOT contain raw personal
      data; subject references are opaque or pseudonymous.
    sensitivity: high
    erasure_mode: hard_delete
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — legal obligation to preserve erasure and
      audit evidence; Constitution §I.4.3 requires tombstones to
      remain visible as evidence the redacted entry existed.

  - id: evidence_export
    description: >-
      Deterministic manifests for scoped incident, counsel, operator,
      or audit-review packages. Filters and manifests may reference
      principals, matches, runs, correlations, and tombstone markers.
    sensitivity: high
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — legal and regulatory evidence obligations;
      GDPR Art. 6(1)(f) — legitimate interest in incident response,
      forensic readiness, and controlled counsel review.

  # ------------------------------------------------------------------
  # F06 data classes (Jurisdiction policy gates + kill switches)
  # ------------------------------------------------------------------
  - id: jurisdiction_policy
    description: >-
      Versioned compliance posture for supported, unsupported, disabled,
      review-required, and retired jurisdictions. Contains policy
      versions, effective windows, closed-list operational reasons, and
      reviewer/operator attribution.
    sensitivity: medium
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — legal and regulatory compliance obligation;
      GDPR Art. 6(1)(f) — legitimate interest in enforcing launch
      posture and compliance controls.

  - id: jurisdiction_gate_evidence
    description: >-
      Immutable policy-gate decisions and denial artifacts that prove a
      ticket, match, or run-dispatch workflow was allowed or blocked
      under a specific jurisdiction policy version.
    sensitivity: high
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — accountability and AEDT compliance evidence;
      GDPR Art. 6(1)(f) — legitimate interest in forensic readiness and
      safe workflow gating.

  - id: jurisdiction_kill_switch_evidence
    description: >-
      Immutable operator/compliance records for no-deploy jurisdiction
      status changes, including prior/new status, reason code,
      operator/reviewer attribution, correlation id, and audit evidence.
    sensitivity: high
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — legal and regulatory compliance obligation;
      GDPR Art. 6(1)(f) — legitimate interest in incident response,
      operational safety, and non-repudiation.

  # ------------------------------------------------------------------
  # F07a data classes (Agent contract registry)
  # ------------------------------------------------------------------
  - id: agent_contract_policy
    description: >-
      Immutable versioned agent contract definitions: side, prompt,
      rubric, tool-surface, model, runtime setting refs, descriptions,
      content hashes, and review provenance. These are policy artifacts,
      not raw negotiation content.
    sensitivity: medium
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — accountability and employment-decision audit
      obligation; GDPR Art. 6(1)(f) — legitimate interest in preserving
      policy-artifact provenance and run reconstruction.

  - id: agent_contract_evidence
    description: >-
      Append-only publication and deprecation events for agent contract
      versions, including actor/reviewer attribution, reason codes,
      correlation ids, and canonical audit-event links.
    sensitivity: medium
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — accountability and compliance evidence;
      GDPR Art. 6(1)(f) — legitimate interest in forensic readiness and
      non-repudiation for policy release events.

  # ------------------------------------------------------------------
  # F07b data classes (Rubric registry + bias-test dispatch gate)
  # ------------------------------------------------------------------
  - id: rubric_policy
    description: >-
      Immutable versioned rubric definitions: dimensions, score ranges,
      weights, aggregation policy, content hashes, publication state, and
      review provenance. These are scoring policy artifacts, not raw
      negotiation content.
    sensitivity: medium
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — accountability and AEDT audit obligation;
      GDPR Art. 6(1)(f) — legitimate interest in preserving scoring
      policy provenance and run reconstruction.

  - id: rubric_evidence
    description: >-
      Bias-test artifacts plus rubric publication/deprecation evidence,
      including methodology refs, jurisdiction coverage, actor/reviewer
      attribution, reason codes, correlation ids, and audit-event links.
    sensitivity: high
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — AEDT bias-audit and accountability evidence;
      GDPR Art. 6(1)(f) — legitimate interest in forensic readiness and
      non-repudiation for policy release events.

  - id: rubric_dispatch_evidence
    description: >-
      Non-PII dispatch gate evidence for rubric allow/deny decisions,
      including rubric refs, bias-test refs, reason codes, correlation
      ids, and audit-event links.
    sensitivity: medium
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — compliance gate evidence; GDPR Art. 6(1)(f) —
      legitimate interest in proving fail-closed dispatch behavior.

  # ------------------------------------------------------------------
  # F08.5 data classes (Tool surface + dispatcher)
  # ------------------------------------------------------------------
  - id: tool_surface_policy
    description: >-
      Immutable versioned tool descriptors and tool surfaces, including
      input/output schemas, disclosure classes, adapter refs, content
      hashes, publication state, and review provenance.
    sensitivity: medium
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — accountability and employment-decision audit
      obligation; GDPR Art. 6(1)(f) — legitimate interest in preserving
      tool policy provenance and run reconstruction.

  - id: tool_dispatch_evidence
    description: >-
      Non-PII dispatcher invocation, unsupported-tool, denial, adapter
      failure, and bypass-finding evidence, including run refs, reason
      codes, correlation ids, and audit-event links.
    sensitivity: medium
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — compliance gate evidence; GDPR Art. 6(1)(f) —
      legitimate interest in proving dispatcher-only tool behavior.

  - id: tool_disclosure_evidence
    description: >-
      Disclosure-routing evidence for tool outputs, including disclosure
      class, route, privacy-filter refs, dispatch-event refs, and audit
      links. Raw tool payloads are not stored here by default.
    sensitivity: medium
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — privacy and accountability evidence; GDPR
      Art. 6(1)(f) — legitimate interest in proving fail-closed
      disclosure routing.

  # ------------------------------------------------------------------
  # F09 data classes (Privacy filter)
  # ------------------------------------------------------------------
  - id: privacy_ruleset_policy
    description: >-
      Immutable versioned privacy filter rulesets, including disclosure
      stages, allowed fields, redaction/refusal rules, content hashes,
      publication state, and audit refs. These are policy artifacts,
      not raw seeker or employer content.
    sensitivity: medium
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — accountability and employment-decision audit
      obligation; GDPR Art. 6(1)(f) — legitimate interest in preserving
      privacy-policy provenance and run reconstruction.

  - id: privacy_filter_evidence
    description: >-
      Review-safe privacy filter decisions and sentinel failures,
      including run refs, ruleset refs, reason codes, redaction counts,
      content hashes, and audit links. Raw sensitive payloads are not
      stored here by default.
    sensitivity: high
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — privacy and compliance evidence; GDPR Art.
      6(1)(f) — legitimate interest in proving fail-closed privacy
      filtering and prompt-injection containment.

  - id: privacy_boundary_evidence
    description: >-
      Counterparty access boundary findings from CI/type guards,
      including source paths, forbidden access patterns, detector refs,
      status, and audit links.
    sensitivity: medium
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — compliance gate evidence; GDPR Art. 6(1)(f) —
      legitimate interest in proving non-bypassable counterparty
      disclosure controls.

  # ------------------------------------------------------------------
  # F10 data classes (Dossier builder + signer)
  # ------------------------------------------------------------------
  - id: dossier_artifact
    description: >-
      Terminal Parley dossier artifacts, including run refs, match refs,
      status, contract refs, ruleset refs, rubric breakdowns, rationales,
      reconciled flags, projection refs, content hashes, and audit refs.
    sensitivity: high
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(b) — performance of contract for match delivery;
      GDPR Art. 6(1)(c) — employment-decision audit obligation.

  - id: dossier_projection
    description: >-
      Stored pre-computed dossier projections for seeker, employer,
      auditor, and A2A receiver audiences. Payloads are filtered before
      storage and are never derived at delivery time.
    sensitivity: high
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(b) — performance of contract for audience-specific
      delivery; GDPR Art. 6(1)(c) — audit and privacy evidence.

  - id: dossier_signature_evidence
    description: >-
      Dossier signing and verification evidence, including algorithm,
      key id, canonicalization version, signed content hash, signature,
      verification reason codes, and audit refs.
    sensitivity: medium
    erasure_mode: tombstone
    default_lawful_basis: >-
      GDPR Art. 6(1)(c) — integrity and non-repudiation evidence; GDPR
      Art. 6(1)(f) — legitimate interest in tamper-evident delivery.

# Tables — one entry per pgTable in packages/db/src/schema/.
# Coverage is enforced by the lint (rule R3).
tables:
  # ------------------------------------------------------------------
  # T003 — organizations + principals (shipped by F02 B2)
  # ------------------------------------------------------------------
  - name: organizations
    file: packages/db/src/schema/organizations.ts
    migration: packages/db/migrations/0000_f02_auth_principals_organizations.sql
    primary_class: identity_principal
    data_subject_linkage:
      column: org_id
      role: none
    columns:
      - { name: org_id, class: identity_principal, erasure: tombstone }
      - { name: clerk_org_id, class: identity_principal, erasure: tombstone, notes: "Mirror of Clerk Organization id; not personal data on its own but ties members to a real organization." }
      - { name: kind, class: identity_principal, erasure: hard_delete, notes: "employer|operator — structural; not subject-bound." }
      - { name: display_name, class: identity_humanref, erasure: tombstone, notes: "May contain natural-person info if the org is a sole proprietorship." }
      - { name: created_at, class: identity_principal, erasure: tombstone }
      - { name: disabled_at, class: identity_principal, erasure: tombstone }

  - name: principals
    file: packages/db/src/schema/principals.ts
    migration: packages/db/migrations/0000_f02_auth_principals_organizations.sql
    primary_class: identity_principal
    data_subject_linkage:
      column: principal_id
      role: self
    columns:
      - { name: principal_id, class: identity_principal, erasure: tombstone, notes: "Internal opaque id; the canonical join target for every other table." }
      - { name: kind, class: identity_principal, erasure: hard_delete, notes: "human|agent|service — structural." }
      - { name: external_idp, class: identity_humanref, erasure: tombstone, notes: "'clerk' for humans; null for agents/services." }
      - { name: external_id, class: identity_humanref, erasure: tombstone, notes: "Clerk user_id for humans; the linkage to a natural person." }
      - { name: tier, class: identity_principal, erasure: hard_delete }
      - { name: org_id, class: identity_principal, erasure: tombstone, fk: organizations.org_id }
      - { name: service_name, class: identity_principal, erasure: hard_delete }
      - { name: service_version, class: identity_principal, erasure: hard_delete }
      - { name: display_name, class: identity_humanref, erasure: tombstone }
      - { name: created_at, class: identity_principal, erasure: tombstone }
      - { name: updated_at, class: identity_principal, erasure: tombstone }
      - { name: disabled_at, class: identity_principal, erasure: tombstone }
      - { name: disabled_reason, class: identity_principal, erasure: tombstone, notes: "May reference incident context; tombstone with the row." }

  # ------------------------------------------------------------------
  # T004 — agent_credentials, service_credentials, revocations
  # (shipped by F02 B4 / B5.2)
  # ------------------------------------------------------------------
  - name: agent_credentials
    file: packages/db/src/schema/agent-credentials.ts
    migration: packages/db/migrations/0001_f02_b4_agent_credentials_signing_keys_revocations.sql
    primary_class: operational_credential
    data_subject_linkage:
      column: principal_id
      role: actor
    columns:
      - { name: credential_id, class: operational_credential, erasure: hard_delete }
      - { name: principal_id, class: operational_credential, erasure: hard_delete, fk: principals.principal_id, notes: "Joins to a kind='agent' principal; agents are not natural persons." }
      - { name: run_id, class: operational_credential, erasure: hard_delete }
      - { name: side, class: operational_credential, erasure: hard_delete }
      - { name: contract_id, class: operational_credential, erasure: hard_delete }
      - { name: contract_version, class: operational_credential, erasure: hard_delete }
      - { name: ticket_id, class: operational_credential, erasure: hard_delete, notes: "Ties credential to a match ticket; ticket-level retention dominates if stricter." }
      - { name: scope_set, class: operational_credential, erasure: hard_delete }
      - { name: kid, class: operational_credential, erasure: hard_delete }
      - { name: issued_at, class: operational_credential, erasure: hard_delete }
      - { name: expires_at, class: operational_credential, erasure: hard_delete }
      - { name: revoked_at, class: operational_credential, erasure: hard_delete }
      - { name: revoked_by, class: operational_credential, erasure: hard_delete, fk: principals.principal_id }
      - { name: revocation_reason, class: operational_credential, erasure: hard_delete }

  - name: service_credentials
    file: packages/db/src/schema/service-credentials.ts
    migration: packages/db/migrations/0002_f02_b5_service_credentials.sql
    primary_class: operational_credential
    data_subject_linkage:
      column: principal_id
      role: actor
    columns:
      - { name: credential_id, class: operational_credential, erasure: hard_delete }
      - { name: principal_id, class: operational_credential, erasure: hard_delete, fk: principals.principal_id, notes: "Joins to a kind='service' principal; services are not natural persons." }
      - { name: scope_set, class: operational_credential, erasure: hard_delete }
      - { name: kid, class: operational_credential, erasure: hard_delete }
      - { name: issued_at, class: operational_credential, erasure: hard_delete }
      - { name: expires_at, class: operational_credential, erasure: hard_delete }
      - { name: revoked_at, class: operational_credential, erasure: hard_delete }
      - { name: revoked_by, class: operational_credential, erasure: hard_delete, fk: principals.principal_id }
      - { name: revocation_reason, class: operational_credential, erasure: hard_delete }
      - { name: rotation_generation, class: operational_credential, erasure: hard_delete }

  - name: revocations
    file: packages/db/src/schema/revocations.ts
    migration: packages/db/migrations/0001_f02_b4_agent_credentials_signing_keys_revocations.sql
    primary_class: operational_credential
    data_subject_linkage:
      column: credential_id
      role: none
    columns:
      - { name: credential_id, class: operational_credential, erasure: hard_delete, notes: "Denormalized from agent_credentials / service_credentials; pruned daily after expiry." }
      - { name: kind, class: operational_credential, erasure: hard_delete }
      - { name: expires_at, class: operational_credential, erasure: hard_delete }
      - { name: revoked_at, class: operational_credential, erasure: hard_delete }

  # ------------------------------------------------------------------
  # T005 — signing_keys (shipped by F02 B4)
  # ------------------------------------------------------------------
  - name: signing_keys
    file: packages/db/src/schema/signing-keys.ts
    migration: packages/db/migrations/0001_f02_b4_agent_credentials_signing_keys_revocations.sql
    primary_class: operational_signing_key
    data_subject_linkage:
      column: kid
      role: none
    columns:
      - { name: kid, class: operational_signing_key, erasure: hard_delete, notes: "Key id; published in JWKS." }
      - { name: algorithm, class: operational_signing_key, erasure: hard_delete }
      - { name: public_key_jwk, class: operational_signing_key, erasure: hard_delete, notes: "Public key; published in JWKS. Not confidential." }
      - { name: purpose, class: operational_signing_key, erasure: hard_delete }
      - { name: created_at, class: operational_signing_key, erasure: hard_delete }
      - { name: activated_at, class: operational_signing_key, erasure: hard_delete }
      - { name: retired_at, class: operational_signing_key, erasure: hard_delete }
      - { name: verify_until, class: operational_signing_key, erasure: hard_delete, notes: "Row drops from JWKS query after this timestamp; hard_delete permitted thereafter." }

  # ------------------------------------------------------------------
  # T006 — audit_events_buffer + revoke_all_sessions_approvals
  # (shipped by F02 B6)
  # ------------------------------------------------------------------
  - name: audit_events_buffer
    file: packages/db/src/schema/audit-events-buffer.ts
    migration: packages/db/migrations/0003_f02_b6_audit_events_buffer.sql
    primary_class: audit_record
    data_subject_linkage:
      column: principal_id
      role: actor
    columns:
      - { name: event_id, class: audit_record, erasure: tombstone }
      - { name: event_name, class: audit_record, erasure: tombstone }
      - { name: principal_id, class: audit_record, erasure: tombstone, fk: principals.principal_id, notes: "Actor of the audit event; the join target for subject erasure." }
      - { name: principal_kind, class: audit_record, erasure: tombstone }
      - { name: role_or_scope, class: audit_record, erasure: tombstone }
      - { name: correlation_id, class: audit_record, erasure: tombstone }
      - { name: payload, class: audit_record, erasure: tombstone, notes: "May contain PII per event_name; payload-level redaction is applied at sink (apps/web/src/auth/audit-sink.ts) per F02 T069/MEDIUM-3." }
      - { name: created_at, class: audit_record, erasure: tombstone }

  # ------------------------------------------------------------------
  # F04 — Ticket store (seeker / employer-req / match)
  # ------------------------------------------------------------------
  - name: seeker_tickets
