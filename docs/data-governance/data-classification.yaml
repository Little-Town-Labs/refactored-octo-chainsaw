      column: org_id
      role: none
    columns:
      - { name: org_id, class: identity_principal, erasure: tombstone }
      - { name: clerk_org_id, class: identity_principal, erasure: tombstone, notes: "Mirror of Clerk Organization id; not personal data on its own but ties members to a real organization." }
      - { name: kind, class: identity_principal, erasure: hard_delete, notes: "employer|operator — structural; not subject-bound." }
      - { name: display_name, class: identity_humanref, erasure: tombstone, notes: "May contain natural-person info if the org is a sole proprietorship." }
      - { name: created_at, class: identity_principal, erasure: tombstone }
      - { name: disabled_at, class: identity_principal, erasure: tombstone }

  - name: principals
    file: packages/db/src/schema/principals.ts
