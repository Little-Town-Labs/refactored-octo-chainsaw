    migration: packages/db/migrations/0005_f04_ticket_store.sql
    primary_class: ticket_intent
    data_subject_linkage:
      column: principal_id
      role: self
    columns:
      - { name: seeker_ticket_id, class: ticket_intent, erasure: tombstone }
      - { name: principal_id, class: ticket_intent, erasure: tombstone, fk: principals.principal_id, notes: "Owning seeker principal; the join target for subject erasure." }
      - { name: identifier, class: ticket_intent, erasure: tombstone, notes: "ST-YYYY-NNNNN; human-readable; tombstoned with the row." }
      - { name: state, class: ticket_intent, erasure: hard_delete, notes: "Structural; enum CHECK." }
      - { name: role_family, class: ticket_intent, erasure: tombstone }
      - { name: comp_band_min, class: ticket_intent, erasure: tombstone }
      - { name: comp_band_max, class: ticket_intent, erasure: tombstone }
      - { name: currency, class: ticket_intent, erasure: hard_delete }
      - { name: jurisdictions, class: ticket_intent, erasure: tombstone, notes: "jsonb non-empty array of ISO-3166-2 codes." }
      - { name: work_mode, class: ticket_intent, erasure: hard_delete }
      - { name: flags, class: ticket_intent, erasure: tombstone, notes: "Lowercase string array; jsonb." }
