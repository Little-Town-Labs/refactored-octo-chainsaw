$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://spyglass.local/contracts/f08-5/tool-catalog-version.schema.yaml"
title: Tool Surface Catalog Version
type: object
additionalProperties: false
required:
  - surface_id
  - version
  - status
  - descriptor_refs
  - content_hash
properties:
  surface_id:
    type: string
    pattern: "^[a-z][a-z0-9_-]*$"
  version:
    type: string
    minLength: 1
  status:
    type: string
    enum: [draft, published, deprecated]
  side_scope:
    type: string
    enum: [seeker, employer, both]
  descriptor_refs:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [name, version]
      properties:
        name:
          type: string
        version:
          type: string
        required:
          type: boolean
  content_hash:
    type: string
    pattern: "^sha256:[a-f0-9]{64}$"
  audit_event_ids:
    type: array
    items:
      type: string
