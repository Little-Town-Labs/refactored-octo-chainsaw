$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "spyglass/jurisdiction-kill-switch-event.v1"
title: "Jurisdiction kill switch event"
type: object
required:
  - kill_switch_event_id
  - jurisdiction_code
  - from_status
  - to_status
  - reason_code
  - policy_version
  - operator_principal_id
  - correlation_id
  - audit_event_id
  - created_at
additionalProperties: false
properties:
  kill_switch_event_id: { type: string, format: uuid }
  jurisdiction_code: { type: string, pattern: "^[A-Z]{2}(?:-[A-Z0-9]{1,3})?$" }
  from_status: { enum: [allowed, unsupported, disabled, review_required, retired] }
  to_status: { enum: [allowed, unsupported, disabled, review_required, retired] }
  reason_code:
    enum:
      - new_regulation
      - counsel_directive
      - incident_response
      - bias_audit_gap
      - launch_posture
      - manual_reenable
  policy_version: { type: string, minLength: 1 }
  operator_principal_id: { type: string, format: uuid }
  reviewer_principal_id: { type: [string, "null"], format: uuid }
  correlation_id: { type: string, minLength: 1 }
  audit_event_id: { type: string, format: uuid }
  created_at: { type: string, format: date-time }
not:
  properties:
    from_status: { const: allowed }
    to_status: { const: allowed }
