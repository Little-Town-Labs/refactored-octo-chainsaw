$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://spyglass.local/contracts/f11/notice-template-version.schema.yaml"
title: NoticeTemplateVersion
type: object
required:
  - template_id
  - version
  - status
  - notice_category
  - jurisdiction_scope
  - content_ref
  - content_hash
  - effective_from
properties:
  template_id:
    type: string
    minLength: 1
  version:
    type: string
    minLength: 1
  status:
    type: string
    enum: [draft, published, retired, superseded]
  notice_category:
    type: string
    enum: [advance_aedt_notice, outcome_transparency, inconclusive_outcome, policy_update]
  jurisdiction_scope:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  content_ref:
    type: string
    minLength: 1
  content_hash:
    type: string
    pattern: "^sha256:[a-f0-9]{64}$"
  effective_from:
    type: string
    format: date-time
  effective_until:
    type: [string, "null"]
    format: date-time
  published_at:
    type: [string, "null"]
    format: date-time
  audit_event_id:
    type: [string, "null"]
    format: uuid
additionalProperties: false
