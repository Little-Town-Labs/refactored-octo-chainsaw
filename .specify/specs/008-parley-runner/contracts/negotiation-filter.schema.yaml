$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://spyglass.local/schemas/parley/negotiation-filter.schema.yaml"
title: Negotiation Filter Event
type: object
additionalProperties: false
required:
  - event_name
  - event_version
  - run_id
  - direction
  - ruleset_ref
  - disclosure_stage
  - source_ref
properties:
  event_name:
    type: string
    enum:
      - negotiation.filter.requested
      - negotiation.filter.completed
  event_version:
    type: integer
    const: 1
  run_id:
    type: string
    format: uuid
  direction:
    type: string
    enum:
      - seeker_to_employer
      - employer_to_seeker
      - tool_to_seeker
      - tool_to_employer
  ruleset_ref:
    $ref: "parley-dispatch-request.schema.yaml#/$defs/privacy_ruleset_ref"
  disclosure_stage:
    type: string
    minLength: 1
  source_ref:
    type: string
    minLength: 1
  content:
    type: object
    additionalProperties: true
  projection_ref:
    type: string
    minLength: 1
  decision:
    type: string
    enum: [allowed, redacted, refused]
