$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://spyglass.local/schemas/parley/negotiation-terminal.schema.yaml"
title: Negotiation Terminal Event
type: object
additionalProperties: false
required:
  - event_name
  - event_version
  - run_id
  - match_ticket_id
  - terminal_state
  - reason_code
properties:
  event_name:
    type: string
    enum:
      - negotiation.run.terminated
      - dossier.produced
  event_version:
    type: integer
    const: 1
  run_id:
    type: string
    format: uuid
  match_ticket_id:
    type: string
    format: uuid
  terminal_state:
    type: string
    enum:
      - complete
      - inconclusive
      - aborted
      - timed_out
      - tool_failure
      - dispatch_refused
  reason_code:
    type: string
    minLength: 1
  dossier_id:
    type: string
    format: uuid
  produced_at:
    type: string
    format: date-time
