$schema: "https://json-schema.org/draft/2020-12/schema"
title: SeekerAdvocateTurnResult
type: object
required:
  - run_id
  - side
  - round
  - message_to_counterparty
  - internal_rationale
  - done_signal
  - flag_proposals
  - frozen_refs
properties:
  run_id:
    type: string
    minLength: 1
  side:
    const: seeker
  round:
    type: integer
    minimum: 1
  message_to_counterparty:
    type: string
    minLength: 1
  internal_rationale:
    type: string
  done_signal:
    type: boolean
  flag_proposals:
    type: array
    items:
      type: string
  invocation_ref:
    type: string
  frozen_refs:
    type: object
    required:
      - contract_ref
      - prompt_ref
      - model_ref
      - manifest_ref
      - rubric_ref
      - privacy_ruleset_ref
      - tool_surface_ref
    additionalProperties: true
  audit_refs:
    type: array
    items:
      type: string
additionalProperties: false
