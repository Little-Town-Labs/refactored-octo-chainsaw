$schema: "https://json-schema.org/draft/2020-12/schema"
title: SeekerAdvocateScoringResult
type: object
required:
  - run_id
  - side
  - rubric_ref
  - dimension_scores
  - headline_rationale
  - flag_proposals
  - frozen_refs
properties:
  run_id:
    type: string
    minLength: 1
  side:
    const: seeker
  rubric_ref:
    type: object
    required:
      - rubric_id
      - version
    properties:
      rubric_id:
        type: string
        minLength: 1
      version:
        type: string
        minLength: 1
    additionalProperties: false
  dimension_scores:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - dimension_id
        - score
        - rationale
      properties:
        dimension_id:
          type: string
          minLength: 1
        score:
          type: number
        rationale:
          type: string
          minLength: 1
        evidence_refs:
          type: array
          items:
            type: string
      additionalProperties: false
  headline_rationale:
    type: string
    minLength: 1
  flag_proposals:
    type: array
    items:
      type: string
  ignored_holistic_score:
    type:
      - number
      - "null"
  invocation_ref:
    type: string
  frozen_refs:
    type: object
    additionalProperties: true
  audit_refs:
    type: array
    items:
      type: string
additionalProperties: false
