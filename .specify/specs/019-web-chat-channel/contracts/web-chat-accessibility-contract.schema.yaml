title: WebChatAccessibilityContract
type: object
required:
  - interactiveElements
  - statusRegions
  - reducedMotionSafe
properties:
  interactiveElements:
    type: array
    items:
      type: object
      required: [id, accessibleName, keyboardActivation, focusOrder, disabledPosture]
      properties:
        id:
          type: string
        accessibleName:
          type: string
        keyboardActivation:
          type: array
          items:
            type: string
            enum: [enter, space]
        focusOrder:
          type: integer
          minimum: 0
        disabledPosture:
          type: string
          enum: [enabled, disabled_with_reason, hidden_when_unavailable]
  statusRegions:
    type: array
    items:
      type: object
      required: [id, politeness]
      properties:
        id:
          type: string
        politeness:
          type: string
          enum: [none, polite, assertive]
  errorPosture:
    type: string
    enum: [inline_and_announced, refused_before_render, none]
  reducedMotionSafe:
    type: boolean
additionalProperties: false
