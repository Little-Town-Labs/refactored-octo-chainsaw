title: WebChatRenderModel
type: object
required:
  - renderId
  - threadId
  - messageParts
  - accessibility
properties:
  renderId:
    type: string
  threadId:
    type: string
  messageParts:
    type: array
    minItems: 1
    items:
      type: object
      required: [partId, kind, text]
      properties:
        partId:
          type: string
        kind:
          type: string
          enum: [text, status, fallback, rich_card_summary, error]
        text:
          type: string
        disclosurePosture:
          type: string
          enum: [approved_projection, system_generated]
  actions:
    type: array
    items:
      type: object
      required: [actionId, label, enabled, activation]
      properties:
        actionId:
          type: string
        label:
          type: string
        enabled:
          type: boolean
        activation:
          type: string
          enum: [button, link, submit]
        disabledReason:
          type: string
  accessibility:
    type: object
    required: [focusOrder, accessibleNames, statusAnnouncement]
    properties:
      focusOrder:
        type: array
        items:
          type: string
      accessibleNames:
        type: object
        additionalProperties:
          type: string
      statusAnnouncement:
        type: string
        enum: [none, polite, assertive]
      reducedMotionSafe:
        type: boolean
  nativeRefs:
    type: object
    additionalProperties:
      type: string
additionalProperties: false
