$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://spyglass.local/contracts/f12/ai-runtime-manifest.schema.yaml"
title: AIRuntimeManifest
type: object
required:
  - manifest_id
  - version
  - status
  - deployment_scope
  - prompt_refs
  - model_refs
  - caller_scopes
  - provider_allowlist
  - cost_controls
  - fallback_policy
  - no_hot_reload
  - content_hash
  - signature_ref
properties:
  manifest_id:
    type: string
    minLength: 1
  version:
    type: string
    minLength: 1
  status:
    type: string
    enum: [draft, active, superseded, retired, revoked]
  deployment_scope:
    type: string
    minLength: 1
  prompt_refs:
    type: array
    minItems: 1
    items:
      type: object
      required: [prompt_id, version]
      properties:
        prompt_id:
          type: string
          minLength: 1
        version:
          type: string
          minLength: 1
      additionalProperties: false
  model_refs:
    type: array
    minItems: 1
    items:
      type: object
      required: [model_profile_id, version]
      properties:
        model_profile_id:
          type: string
          minLength: 1
        version:
          type: string
          minLength: 1
      additionalProperties: false
  caller_scopes:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  provider_allowlist:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  cost_controls:
    type: array
    items:
      type: object
      required: [scope, ceiling, unit, on_preflight_exceeded]
      properties:
        scope:
          type: string
          enum: [run, match, caller, manifest, release]
        ceiling:
          type: number
          minimum: 0
        unit:
          type: string
          minLength: 1
        on_preflight_exceeded:
          type: string
          enum: [refuse, downgrade]
      additionalProperties: false
  fallback_policy:
    type: string
    enum: [none, refuse, manifest_authorized]
  no_hot_reload:
    type: boolean
    const: true
  content_hash:
    type: string
    pattern: "^sha256:[a-f0-9]{64}$"
  signature_ref:
    type: string
    minLength: 1
  published_by:
    type: [string, "null"]
    format: uuid
  published_at:
    type: [string, "null"]
    format: date-time
  audit_event_id:
    type: [string, "null"]
    format: uuid
additionalProperties: false
