$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://spyglass.local/contracts/f12/model-profile-version.schema.yaml"
title: ModelProfileVersion
type: object
required:
  - model_profile_id
  - version
  - status
  - provider
  - model
  - capability_class
  - risk_tier
  - allowed_scopes
  - cost_metadata
  - supply_chain_evidence
properties:
  model_profile_id:
    type: string
    minLength: 1
  version:
    type: string
    minLength: 1
  status:
    type: string
    enum: [draft, published, deprecated, retired, superseded]
  provider:
    type: string
    minLength: 1
  model:
    type: string
    minLength: 1
  capability_class:
    type: string
    enum: [chat, reasoning, embedding, classification, evaluation]
  risk_tier:
    type: string
    enum: [low, medium, high]
  allowed_scopes:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  cost_metadata:
    type: object
    required: [pricing_ref, unit, captured_at]
    properties:
      pricing_ref:
        type: string
        minLength: 1
      unit:
        type: string
        enum: [token, request, character]
      captured_at:
        type: string
        format: date-time
    additionalProperties: false
  supply_chain_evidence:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 1
  release_manifest_ref:
    type: [string, "null"]
  signature_ref:
    type: [string, "null"]
  published_by:
    type: [string, "null"]
    format: uuid
  published_at:
    type: [string, "null"]
    format: date-time
  audit_event_id:
    type: [string, "null"]
    format: uuid
additionalProperties: false
