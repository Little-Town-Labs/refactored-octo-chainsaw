$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://spyglass.local/contracts/telegram-audit-event.schema.json"
title: TelegramAuditEvent
type: object
additionalProperties: false
required:
  - event_id
  - event_type
  - channel_kind
  - occurred_at
  - correlation_id
properties:
  event_id:
    type: string
    minLength: 1
  event_type:
    enum:
      - channel.normalized
      - channel.refused
      - channel.duplicate_suppressed
      - channel.outbound_rendered
      - channel.delivery_recorded
      - channel.capability_registered
  channel_kind:
    const: telegram
  message_id:
    type: string
  telegram_update_id:
    type: integer
  telegram_chat_ref:
    type: string
  principal_id:
    type: string
  reason_code:
    type: string
  occurred_at:
    type: string
    format: date-time
  correlation_id:
    type: string
    minLength: 1
  native_ref:
    type: string
  evidence:
    type: object
description: >
  Audit-ready evidence emitted by the Telegram adapter for normalization,
  refusal, duplicate suppression, rendering, delivery, and capability events.
